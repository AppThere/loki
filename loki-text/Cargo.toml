[package]
name = "loki-text"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Dioxus Native word-processor application for the Loki document suite"
repository = "https://github.com/appthere/loki"

[lib]
name = "loki_text"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "loki-text-desktop"
path = "src/main.rs"

[dependencies]
# Dioxus Native (Blitz renderer) with client-side router.
dioxus          = { version = "=0.7.9", features = ["native", "router"] }
# Format-neutral document model — passed to WgpuSurface after import.
loki-doc-model  = { path = "../loki-doc-model" }
# DOCX/OOXML import — converts file bytes to loki_doc_model::Document.
loki-ooxml      = { path = "../loki-ooxml" }
# ODT/ODF import — converts OpenDocument Text files to loki_doc_model::Document.
loki-odf        = { path = "../loki-odf" }
# Bundled document templates (Markdown, APA, MLA, Screenplay, Resume).
loki-templates  = { path = "../loki-templates" }
# PDF / PDF-X export for the Publish ribbon tab.
loki-pdf        = { path = "../loki-pdf" }
# EPUB 3.3 export for the Publish ribbon tab.
loki-epub       = { path = "../loki-epub" }
# Layout engine — converts Document to DocumentLayout for scene painting.
loki-layout     = { path = "../loki-layout" }
# Shared AppThere design tokens and UI components.
appthere-ui     = { path = "../appthere-ui" }
loki-app-shell  = { path = "../loki-app-shell" }
# Cross-platform file picker (crates.io).
loki-file-access.workspace = true
# Cross-platform URL opener for Ctrl/Cmd+click on hyperlinks (feature 5.11).
webbrowser       = "1"
# Typed error derivation.
thiserror       = "2"
# Async event tracing — used for warn!/error!.
tracing          = "0.1"
# Force fontconfig-dlopen on fontique so it uses the same dlopen path as
# fontique v0.6 (pulled in by blitz-dom), which activates
# yeslogic-fontconfig-sys/dlopen for the whole workspace.  Without this,
# fontique would try to use static C function symbols that are absent when
# dlopen mode is in effect.
fontique        = { version = "0.10", features = ["fontconfig-dlopen"] }
loro = "1.11.1"
# oneshot channel used to await the off-main-thread document-open layout.
futures-channel = "0.3"
# Unicode grapheme cluster segmentation for correct backspace/delete behaviour.
unicode-segmentation = "1"
# Image decoding for Insert → Image (intrinsic pixel dimensions).
image = "0.25"
# Base64 encoding for embedding inserted images as data URIs.
base64 = "0.22"
# Fluent-based internationalisation for all user-visible strings.
loki-i18n = { path = "../loki-i18n" }
# Tiered-cache page renderer with DocumentView component.
loki-renderer = { path = "../loki-renderer" }
# Bundled fallback fonts for the Android CPU renderer.
loki-fonts.workspace = true

[package.metadata.android]
package = "com.appthere.loki"
# Default to a universal (multi-ABI) build covering 64-bit ARM phones/tablets
# and x86_64 (Chromebooks/ARC, emulators, some Intel devices).  A plain
# `cargo apk build` / `dx` build therefore produces one APK that runs on both.
# scripts/build-android.sh --abi <arm64|x64> overrides this with a single
# `--target` for fast single-device deploys.
build_targets = ["aarch64-linux-android", "x86_64-linux-android"]

[package.metadata.android.sdk]
min_sdk_version = 26          # wgpu requires Vulkan, available from API 26
target_sdk_version = 34
compile_sdk_version = 34

[package.metadata.android.application]
label = "Loki"

# cargo-apk requires a signing config for release builds.
# scripts/build-android.ps1 copies the Android Studio debug keystore to this
# path (target/android-pkg/signing.keystore) before running `cargo apk build
# --release`, satisfying cargo-apk.  The build script's own apksigner step
# (Step 6) re-signs the final post-processed APK with the same key, so this
# cargo-apk signature is overwritten and exists only to unblock the build.
# For Play Store distribution replace with a real release keystore.
[package.metadata.android.signing.release]
path = "../target/android-pkg/signing.keystore"
keystore_password = "android"

[target.'cfg(target_os = "android")'.dependencies]
android-activity = { workspace = true }
blitz-shell = "0.2.3"
android_logger = "0.15"
log = "0.4"
