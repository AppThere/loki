[package]
name = "loki-renderer"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Dioxus signal integration and tracing orchestration layer for Loki's render cache"

[dependencies]
appthere-canvas   = { workspace = true }
loki-doc-model    = { path = "../loki-doc-model" }
loki-layout       = { path = "../loki-layout" }
loki-vello        = { path = "../loki-vello" }
appthere-ui       = { path = "../appthere-ui" }
dioxus            = { version = "=0.7.9", features = ["native"] }
# CustomPaintSource / CustomPaintCtx / TextureHandle / DeviceHandle for LokiPageSource.
anyrender_vello   = "0.6.2"
tracing           = "0.1"
wgpu              = "26"
vello             = "0.6"
tokio             = { version = "1", features = ["time", "sync"] }

[dev-dependencies]
pollster = "0.4"

[lints.rust]
# android_gpu is a custom cfg flag set via RUSTFLAGS='--cfg android_gpu' when
# building for a Vulkan-capable physical Android device.  Declare it so rustc
# does not emit unexpected_cfg warnings (and so -D warnings does not fail CI).
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(android_gpu)'] }
