# SPDX-License-Identifier: Apache-2.0
# cargo-fuzz harness for loki-basic (macro spec §12, T9 — parser hardening).
#
# Detached from the main workspace (own empty [workspace] table) so ordinary
# `cargo build --workspace` and CI never try to build it — it needs a nightly
# toolchain + libFuzzer. Run with: `cargo +nightly fuzz run lex` (etc.).
[package]
name = "loki-basic-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
libfuzzer-sys = "0.4"
loki-basic = { path = ".." }

[[bin]]
name = "lex"
path = "fuzz_targets/lex.rs"
test = false
doc = false

[[bin]]
name = "parse"
path = "fuzz_targets/parse.rs"
test = false
doc = false

[[bin]]
name = "interp"
path = "fuzz_targets/interp.rs"
test = false
doc = false
