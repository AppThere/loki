[package]
name = "loki-sheet-model"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Format-neutral spreadsheet document model for the Loki suite"
repository = "https://github.com/appthere/loki"
keywords = ["spreadsheet", "xlsx", "model", "loki"]
categories = ["data-structures", "encoding"]

[features]
default = []
serde = ["dep:serde", "loki-primitives/serde"]

[dependencies]
loki-primitives = { path = "../loki-primitives" }
thiserror = "2"
loro = "1.11.1"
serde = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
serde_json = "1"
# Integration tests drive the LoroDoc directly to exercise concurrent merges.
loro = "1.11.1"
