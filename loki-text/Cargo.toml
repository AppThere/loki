[package]
name = "loki-text"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Dioxus Native word-processor application for the Loki document suite"
repository = "https://github.com/appthere/loki"

[lib]
name = "loki_text"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "loki-text-desktop"
path = "src/main.rs"

[dependencies]
# Dioxus Native (Blitz renderer) with client-side router.
dioxus          = { version = "0.7", features = ["native", "router"] }
# Format-neutral document model — passed to WgpuSurface after import.
loki-doc-model  = { path = "../loki-doc-model" }
# DOCX/OOXML import — converts file bytes to loki_doc_model::Document.
loki-ooxml      = { path = "../loki-ooxml" }
# ODT/ODF import — converts OpenDocument Text files to loki_doc_model::Document.
loki-odf        = { path = "../loki-odf" }
# Layout engine — converts Document to DocumentLayout for scene painting.
loki-layout     = { path = "../loki-layout" }
# In-workspace Vello GPU rendering backend.
loki-vello      = { path = "../loki-vello" }
# Shared AppThere design tokens and UI components.
appthere-ui     = { path = "../appthere-ui" }
# Cross-platform file picker (crates.io).
loki-file-access.workspace = true
# Typed error derivation.
thiserror       = "2"
# Vello/wgpu integration point for custom GPU paint sources (CustomPaintSource).
anyrender_vello  = "0.6.2"
# wgpu device + queue handle passed to CustomPaintSource::resume().
wgpu_context     = "0.1.2"
# Async event tracing — used for warn!/error! in document_source.
tracing          = "0.1"
# Vello scene builder — used in WgpuSurface to paint the blank A4 rect.
vello           = "0.6"
# Peniko brush / fill types (re-used directly so the API surface is explicit).
peniko          = "0.5"
# Kurbo geometry primitives (Rect, Stroke, Affine) for scene construction.
kurbo           = "0.12"
# Force fontconfig-dlopen on fontique v0.8 so it uses the same dlopen path as
# fontique v0.6 (pulled in by blitz-dom), which activates
# yeslogic-fontconfig-sys/dlopen for the whole workspace.  Without this,
# fontique v0.8 would try to use static C function symbols that are absent when
# dlopen mode is in effect.
fontique        = { version = "0.8", features = ["fontconfig-dlopen"] }
loro = "1.11.1"
# Unicode grapheme cluster segmentation for correct backspace/delete behaviour.
unicode-segmentation = "1"
# Platform-specific data/config directory paths for recent-documents persistence.
dirs = "5"
# JSON serialisation for recent-documents file.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Fluent-based internationalisation for all user-visible strings.
loki-i18n = { path = "../loki-i18n" }
# Tiered-cache page renderer with DocumentView component.
loki-renderer = { path = "../loki-renderer" }

[package.metadata.android]
package = "com.appthere.loki"
build_targets = ["aarch64-linux-android"]

[package.metadata.android.sdk]
min_sdk_version = 26          # wgpu requires Vulkan, available from API 26
target_sdk_version = 34
compile_sdk_version = 34

[package.metadata.android.application]
label = "Loki"

[target.'cfg(target_os = "android")'.dependencies]
android-activity = { workspace = true }
blitz-shell = "0.2.3"
android_logger = "0.15"
log = "0.4"
