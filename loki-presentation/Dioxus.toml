# Dioxus CLI configuration for loki-presentation.
#
# Run serve from inside loki-presentation/ or with --package loki-presentation.
#
# Android (device or emulator, API ≥ 26, Vulkan required):
#   dx serve --platform android --package loki-presentation
#
# Desktop native:
#   dx serve --platform native --package loki-presentation

[application]
name = "loki-presentation"

[bundle]
identifier = "com.appthere.loki.presentation"
publisher = "AppThere"

[android]
min_sdk_version = 26
