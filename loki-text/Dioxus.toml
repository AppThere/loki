# Dioxus CLI configuration for loki-text.
#
# This file configures `dx` for the loki-text binary package. Run all `dx`
# commands from the workspace root with `--package loki-text`, or from
# inside the loki-text/ directory.
#
# IMPORTANT — platform notes:
#
#   loki-text uses `features = ["native"]` (the Blitz/wgpu GPU renderer) on all
#   platforms including Android.  The Android entry point (`android_main`) lives
#   in `src/lib.rs` — it calls `blitz_shell::set_android_app` so that the Blitz
#   event loop can retrieve the AndroidApp before `dioxus::launch` creates it.
#
#   Run on a connected device or emulator (API ≥ 26, Vulkan required):
#     dx serve --platform android --package loki-text
#
#   For desktop native testing:
#     dx serve --platform native --package loki-text

[application]
name = "loki-text"

[bundle]
# Reverse-domain bundle identifier used for APK/IPA packaging.
identifier = "com.appthere.loki"
publisher = "AppThere"

[android]
# wgpu requires Vulkan, available from Android API 26 (Android 8.0 Oreo).
# Devices below API 26 cannot run the Blitz/wgpu render pipeline.
min_sdk_version = 26
