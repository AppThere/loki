# SPDX-License-Identifier: Apache-2.0
# cargo-fuzz harness for loki-macro-sig (macro spec §12, T9 — parser hardening).
#
# Detached from the main workspace (own empty [workspace] table) so ordinary
# `cargo build --workspace` and CI never build it. Run with:
#   cargo +nightly fuzz run extract_vba_signatures
[package]
name = "loki-macro-sig-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
libfuzzer-sys = "0.4"
loki-macro-sig = { path = ".." }

[[bin]]
name = "extract_vba_signatures"
path = "fuzz_targets/extract_vba_signatures.rs"
test = false
doc = false
