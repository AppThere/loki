[package]
name = "loki-server-api"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "REST API surface for the Loki server: workspaces, documents, members, blobs, GDPR (spec §3)"
repository = "https://github.com/appthere/loki"

[dependencies]
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
axum = { workspace = true }
tracing = { workspace = true }
base64 = { workspace = true }
loki-model = { workspace = true }
loki-crypto = { workspace = true }
loki-server-auth = { workspace = true }
loki-server-store = { workspace = true }
loki-server-collab = { workspace = true }
loki-server-audit = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
object_store = { workspace = true }
