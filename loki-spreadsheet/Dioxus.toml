# Dioxus CLI configuration for loki-spreadsheet.
#
# Run serve from inside loki-spreadsheet/ or with --package loki-spreadsheet.
#
# Android (device or emulator, API ≥ 26, Vulkan required):
#   dx serve --platform android --package loki-spreadsheet
#
# Desktop native:
#   dx serve --platform native --package loki-spreadsheet

[application]
name = "loki-spreadsheet"

[bundle]
identifier = "com.appthere.loki.spreadsheet"
publisher = "AppThere"

[android]
min_sdk_version = 26
